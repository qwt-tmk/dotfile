add_newline = true
right_format = """$time$username"""

[character]
success_symbol = '[ÔØ»](fg:cyan)'
error_symbol = '[ÔØ»](fg:magenta)'

[time]
disabled = false
format = '[$time]($style) '
style = "fg:#888888"

[cmd_duration]
show_milliseconds = false
style = "fg:#aaaaaa"
format = ' [¾▒½î $duration]($style)'

[directory]
style = "fg:blue"
